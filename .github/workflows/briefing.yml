name: Daily Portfolio Briefing

on:
  schedule:
    - cron: '0 22 * * *'   # 오전 07:00 KST
    - cron: '0 3 * * *'    # 오후 12:00 KST
    - cron: '0 8 * * *'    # 오후 05:00 KST
    - cron: '0 13 * * *'   # 오후 10:00 KST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-portfolio-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz
      - name: Validate config and script
        run: |
          python -m py_compile portfolio_briefing.py
          python -c "import json; json.load(open('portfolio.json', encoding='utf-8'))"
          python -c "import json; json.load(open('screener.json', encoding='utf-8'))"
          python -m unittest
      - name: Run briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: python portfolio_briefing.py
      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Portfolio Bot"
          git config user.email "bot@portfolio.local"
          git add briefings/*.md 2>/dev/null || true
          git commit -m "Daily briefing - $(date +%Y-%m-%d)" || true
          git pull --rebase origin main
          git push
      - name: Notify failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=⚠️ 포트폴리오 브리핑 GitHub Actions 실패: ${GITHUB_RUN_URL}"
